<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Timestamp Scaler</title>
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #fff; color: #333; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #fafafa; }
        .log { background: #000; color: #0f0; padding: 15px; font-family: monospace; height: 200px; overflow-y: auto; border-radius: 4px; font-size: 12px; margin-top: 15px;}
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        .progress { margin: 10px 0; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>FFmpeg .mp4 Timestamp Scaler</h2>
    <p>Finds the absolute maximum <code>-itsscale</code> possible without letting the video exceed <strong>9m 59s (599 seconds)</strong>.</p>

    <div class="box">
        <input type="file" id="video-input" accept="video/mp4"><br><br>
        <button id="process-btn" disabled>Load FFmpeg & Process</button>
        <div class="progress" id="status-text">Initializing scripts...</div>
        <div class="log" id="log-output">System idle. Ready...</div>
        <br>
        <a id="download-link" style="display:none;" download="output.mp4"><button style="background:#28a745;">Download Optimized Video</button></a>
    </div>

    <script>
        // Use older, infinitely more stable Global Object bindings for client browser execution
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        const inputEl = document.getElementById('video-input');
        const buttonEl = document.getElementById('process-btn');
        const statusEl = document.getElementById('status-text');
        const logEl = document.getElementById('log-output');
        const downloadLink = document.getElementById('download-link');

        const TARGET_MAX_SECONDS = 599;

        function log(message) {
            logEl.innerText += message + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function init() {
            try {
                statusEl.innerText = "Loading WebAssembly core modules...";
                
                ffmpeg.setLogger(({ type, message }) => {
                    if (!message.includes('frame=') && !message.includes('size=')) {
                        log(`[${type}] ${message}`);
                    }
                });

                await ffmpeg.load();
                statusEl.innerText = "FFmpeg Loaded! Choose an MP4 file to begin.";
                inputEl.addEventListener('change', () => { buttonEl.disabled = false; });
            } catch (err) {
                statusEl.innerText = "Critical Loading Error. Read system log below.";
                log("Error: " + err.message);
                log("If using Safari/Brave, switch to Chrome or Firefox. Cross-Origin isolation may have failed.");
            }
        }

        async function getVideoDuration(filename) {
            // Write a small script to grab duration out of the log system because ffprobe is separate in v0.11
            let duration = 0;
            ffmpeg.setLogger(({ message }) => {
                const match = message.match(/Duration: (\d+):(\d+):(\d+\.\d+)/);
                if (match) {
                    const hours = parseInt(match[1]);
                    const minutes = parseInt(match[2]);
                    const seconds = parseFloat(match[3]);
                    duration = (hours * 3600) + (minutes * 60) + seconds;
                }
            });
            
            // Running a dummy pass to extract metadata fields safely
            await ffmpeg.run('-i', filename);
            return duration;
        }

        async function processVideo() {
            buttonEl.disabled = true;
            downloadLink.style.display = 'none';
            const file = inputEl.files[0];
            if (!file) return;

            statusEl.innerText = "Mounting video file to WebAssembly file system...";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            statusEl.innerText = "Analyzing duration properties...";
            const origDuration = await getVideoDuration('input.mp4');
            
            // Re-hook logger to ignore noise
            ffmpeg.setLogger(({ message }) => { log(message); });

            log(`Detected File Duration: ${origDuration} seconds.`);

            if (origDuration <= 0 || origDuration >= TARGET_MAX_SECONDS) {
                statusEl.innerText = "Execution stopped.";
                log("Error: File is either invalid or already over 9m 59s.");
                return;
            }

            let maxItsScale = TARGET_MAX_SECONDS / origDuration;
            log(`Calculated max processing value: ${maxItsScale}`);

            statusEl.innerText = "Processing scaling layout via FFmpeg...";
            
            await ffmpeg.run(
                '-itsscale', maxItsScale.toString(),
                '-i', 'input.mp4',
                '-c', 'copy',
                '-video_track_timescale', '90000',
                'output.mp4'
            );

            statusEl.innerText = "Finalizing data array...";
            const data = ffmpeg.FS('readFile', 'output.mp4');

            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);
            
            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
            statusEl.innerText = "Done! Ready for download.";

            // Wipe local memory structure
            ffmpeg.FS('unlink', 'input.mp4');
            ffmpeg.FS('unlink', 'output.mp4');
        }

        // Delay execution briefly to let service worker negotiate domain headers safely
        window.addEventListener('load', () => {
            setTimeout(init, 1000);
        });
    </script>
</body>
</html>
