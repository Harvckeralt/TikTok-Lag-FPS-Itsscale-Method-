<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg Timestamp Scaler (Single Thread)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #fff; color: #333; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #fafafa; }
        .log { background: #000; color: #0f0; padding: 15px; font-family: monospace; height: 200px; overflow-y: auto; border-radius: 4px; font-size: 12px; margin-top: 15px;}
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        .progress { margin: 10px 0; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>FFmpeg .mp4 Timestamp Scaler</h2>
    <p>Bypasses Chrome security blocks by running in single-thread compatibility mode.</p>

    <div class="box">
        <input type="file" id="video-input" accept="video/mp4"><br><br>
        <button id="process-btn" disabled>Processing...</button>
        <div class="progress" id="status-text">Loading single-thread core modules...</div>
        <div class="log" id="log-output">System starting...</div>
        <br>
        <a id="download-link" style="display:none;" download="output.mp4"><button style="background:#28a745;">Download Optimized Video</button></a>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.4/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const inputEl = document.getElementById('video-input');
        const buttonEl = document.getElementById('process-btn');
        const statusEl = document.getElementById('status-text');
        const logEl = document.getElementById('log-output');
        const downloadLink = document.getElementById('download-link');

        const TARGET_MAX_SECONDS = 599;

        function log(message) {
            logEl.innerText += message + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function init() {
            try {
                ffmpeg.on('log', ({ message }) => {
                    if (!message.includes('frame=') && !message.includes('size=')) {
                        log(message);
                    }
                });

                // Crucial fix: Force loading the single-thread build of FFmpeg which removes SharedArrayBuffer requirement
                await ffmpeg.load({
                    coreURL: 'https://unpkg.com/@ffmpeg/core-st@0.12.10/dist/esm/ffmpeg-core.js'
                });

                statusEl.innerText = "FFmpeg Core Ready! Select your MP4 file.";
                log("System initialized in Single-Thread safety mode.");
                
                inputEl.addEventListener('change', () => { 
                    if(inputEl.files.length > 0) {
                        buttonEl.innerText = "Process Video";
                        buttonEl.disabled = false; 
                    }
                });
            } catch (err) {
                statusEl.innerText = "Failed initialization.";
                log("Fatal: " + err.message);
            }
        }

        async function getVideoDuration(filename) {
            let duration = 0;
            // Listen specifically to the duration log output from FFmpeg
            const durationListener = ({ message }) => {
                const match = message.match(/Duration: (\d+):(\d+):(\d+\.\d+)/);
                if (match) {
                    const hours = parseInt(match[1]);
                    const minutes = parseInt(match[2]);
                    const seconds = parseFloat(match[3]);
                    duration = (hours * 3600) + (minutes * 60) + seconds;
                }
            };
            
            ffmpeg.on('log', durationListener);
            await ffmpeg.exec(['-i', filename]);
            // Clean up listener
            ffmpeg.off('log', durationListener);
            return duration;
        }

        async function processVideo() {
            buttonEl.disabled = true;
            downloadLink.style.display = 'none';
            const file = inputEl.files[0];
            if (!file) return;

            statusEl.innerText = "Writing source file to virtual disk...";
            await ffmpeg.writeFile('input.mp4', await fetchFile(file));

            statusEl.innerText = "Reading input metadata values...";
            const origDuration = await getVideoDuration('input.mp4');
            log(`Detected exact length: ${origDuration} seconds`);

            if (origDuration <= 0 || origDuration >= TARGET_MAX_SECONDS) {
                statusEl.innerText = "Error tracking file timeline.";
                log("Aborted: Video duration is problematic or already longer than 9m 59s.");
                return;
            }

            const maxItsScale = TARGET_MAX_SECONDS / origDuration;
            log(`Calculated precise target scale multiplier: ${maxItsScale}`);

            statusEl.innerText = "Processing video stream adjustments...";
            
            await ffmpeg.exec([
                '-itsscale', maxItsScale.toString(),
                '-i', 'input.mp4',
                '-c', 'copy',
                '-video_track_timescale', '90000',
                'output.mp4'
            ]);

            statusEl.innerText = "Generating asset download pointer...";
            const data = await ffmpeg.readFile('output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);

            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
            statusEl.innerText = "Execution complete!";
            log("Process finished successfully.");

            // Clear virtual disk spaces
            await ffmpeg.deleteFile('input.mp4');
            await ffmpeg.deleteFile('output.mp4');
        }

        buttonEl.addEventListener('click', processVideo);
        init();
    </script>
</body>
</html>
